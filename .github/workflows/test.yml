name: Test sb manager

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  syntax:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - alpine:3.23
          - debian:bookworm-slim
    steps:
      - uses: actions/checkout@v4
      - name: Shell syntax and installer dry-run
        run: |
          docker run --rm \
            -v "$PWD:/work:ro" \
            -w /work \
            "${{ matrix.image }}" \
            sh -c '
              set -eu
              sh -n install.sh
              sh -n sb
              for file in lib/*.sh tests/*.sh; do sh -n "$file"; done
              sh install.sh --server-address 203.0.113.10 --dry-run
            '

  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate four concurrent node configurations
        run: |
          docker run --rm \
            -v "$PWD:/work:ro" \
            -w /work \
            alpine:3.23 \
            sh -c '
              set -eu
              apk add --no-cache sing-box jq openssl coreutils
              sh tests/render.sh
            '
